name: Update RSS Feed

permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *"  # every hour
  workflow_dispatch:     # allows manual run

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser feedgen

      - name: Run script
        run: python filter.py

      - name: Commit updated RSS
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add filtered_srf.xml
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update filtered RSS"
          git pull --rebase
          git push
